<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>FrenkyFit - Carta Fedeltà</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="/styles.css">
  <script defer src="/translations.js"></script>
  <script defer src="/sw-register.js"></script>
  <script defer src="/login.js"></script>
</head>
<body>
  <div class="container" id="app">
    <div class="card">
      <div id="langSelector"></div>
      <div class="logo">
        <img src="/logo-frenkyfit.png?v=1" alt="FrenkyFit" class="logo-img" />
      </div>

      <div id="loginForm">
        <div class="error-msg" id="errorMsg"></div>

        <div class="form-group">
          <label for="name" id="labelName">Nome</label>
          <input type="text" id="name" placeholder="Il tuo nome" autocomplete="name" required />
        </div>

        <div class="form-group">
          <label for="email" id="labelEmail">Email</label>
          <input type="email" id="email" placeholder="la.tua@email.com" autocomplete="email" required />
        </div>

        <button class="btn" id="loginBtn" onclick="handleLogin()">
          Accedi / Registrati
        </button>

        <p id="loginFooter" style="text-align:center;margin-top:16px;font-size:12px;color:#555;">
          Ogni 10 consumazioni, 1 gratis!
        </p>
      </div>

      <div class="loading hidden" id="loadingState">
        <div class="spinner"></div>
        <p id="loadingText">Caricamento carta fedeltà...</p>
      </div>
    </div>
  </div>

  <script>
    if (localStorage.getItem('frenkyfit_token')) {
      window.location.href = '/card';
    }
  </script>
</body>
</html>
