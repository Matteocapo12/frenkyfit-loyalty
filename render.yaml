services:
  - type: web
    name: frenkyfit-loyalty
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: frenkyfit-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: 20

databases:
  - name: frenkyfit-db
    plan: free
    databaseName: frenkyfit
    user: frenkyfit
